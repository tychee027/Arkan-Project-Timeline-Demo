<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkan Engineering Consultant — Project Timeline</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #f0efed;
  --text: #1a1a18; --text-secondary: #6b6b67;
  --border: rgba(0,0,0,0.12); --border-hover: rgba(0,0,0,0.25);
  --radius-md: 8px; --radius-lg: 12px;
  --red: #E24B4A; --red-light: #FCEBEB; --red-text: #791F1F;
  --green: #1D9E75; --blue: #185FA5;
  /* Arkan brand */
  --accent: #1B2C4D;       /* brand navy — primary actions */
  --accent-hover: #101d36;
  --accent-glow: rgba(27,44,77,0.15);
  --brand-red: #D42E2E;    /* logo chevron red */
  --brand-red-dark: #A82323;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg-secondary: #252522; --bg-tertiary: #2e2e2b;
    --text: #f0efe8; --text-secondary: #9a9a94;
    --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.22);
    --red: #F09595; --red-light: #501313; --red-text: #F7C1C1;
    --green: #5DCAA5; --blue: #85B7EB;
    --accent: #7C9CC9;
    --accent-hover: #96B2D6;
    --accent-glow: rgba(124,156,201,0.2);
    --brand-red: #E9706D;
    --brand-red-dark: #D45350;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; }

/* Brand */
.brand-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.brand-mark { width: 34px; height: 34px; flex-shrink: 0; }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.brand-name { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.brand-sub { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); white-space: nowrap; }
.brand-ar { font-size: 12px; color: var(--text-secondary); margin-top: 3px; direction: rtl; font-weight: 600; }
.brand-mark-img { display: block; height: auto; width: auto; }
.brand-mark-img--sidebar { max-width: 190px; }
.brand-mark-img--setup { max-width: 260px; }
@media (prefers-color-scheme: dark) {
  .brand-mark-img { background: #fff; padding: 8px 12px; border-radius: var(--radius-md); }
}
.sidebar-top { position: relative; padding: 1.25rem 1rem 0.75rem; border-bottom: 0.5px solid var(--border); overflow: hidden; }
.sidebar-top::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--brand-red), var(--brand-red-dark)); }

/* Toast */
#toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: #1a1a18; color: #fff;
  font-size: 13px; padding: 10px 16px; border-radius: var(--radius-md);
  z-index: 600; display: none; align-items: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
#toast.show { display: flex; }
#toast.error { background: var(--red); }

/* Layout */
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px; min-width: 260px; background: var(--bg);
  border-right: 0.5px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.app-sub { font-size: 12px; color: var(--text-secondary); }
.sidebar-section { padding: 0.75rem 1rem 0.5rem; }
.sidebar-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.proj-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-md); cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s; }
.proj-item:hover { background: var(--bg-secondary); }
.proj-item.active { background: var(--bg-secondary); font-weight: 500; }
.proj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.proj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-count { font-size: 11px; color: var(--text-secondary); background: var(--bg-tertiary); padding: 1px 6px; border-radius: 20px; }
.proj-actions { display: none; gap: 2px; }
.proj-item:hover .proj-actions { display: flex; }
.icon-btn { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; }
.icon-btn:hover { background: var(--border); color: var(--text); }
.icon-btn.danger:hover { color: var(--red-text); background: var(--red-light); }
.sidebar-footer { margin-top: auto; padding: 1rem; border-top: 0.5px solid var(--border); }
.main { flex: 1; overflow-x: hidden; }
.page { display: none; }
.page.active { display: block; }


/* Overview */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 10px; padding: 1.5rem; }
.ov-card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1rem 1.25rem; }
.ov-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
.ov-value { font-size: 26px; font-weight: 500; }
.proj-cards { padding: 0 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 12px; }
.proj-card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
.proj-card:hover { border-color: var(--border-hover); }
.proj-card-header { display: flex; align-items: center; gap: 10px; padding: 1rem 1.25rem 0.75rem; }
.proj-card-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.proj-card-title { font-size: 15px; font-weight: 500; flex: 1; }
.proj-card-meta { font-size: 12px; color: var(--text-secondary); }
.proj-card-stats { display: grid; grid-template-columns: repeat(4,1fr); border-top: 0.5px solid var(--border); }
.proj-card-stat { padding: 0.625rem 1rem; border-right: 0.5px solid var(--border); }
.proj-card-stat:last-child { border-right: none; }
.cs-label { font-size: 11px; color: var(--text-secondary); }
.cs-value { font-size: 16px; font-weight: 500; margin-top: 2px; }
.mini-gantt { padding: 0.75rem 1.25rem 1rem; }
.mini-bar-wrap { position: relative; height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
.mini-bar { position: absolute; height: 8px; border-radius: 4px; }
.ov-title { font-size: 18px; font-weight: 500; padding: 1.5rem 1.5rem 0.25rem; }
.ov-subtitle { font-size: 13px; color: var(--text-secondary); padding: 0 1.5rem 1rem; }

/* Detail */
.detail-header { padding: 1.5rem; border-bottom: 0.5px solid var(--border); background: var(--bg); }
.back-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-secondary); background: none; border: none; cursor: pointer; padding: 4px 0; font-family: inherit; margin-bottom: 0.5rem; }
.back-btn:hover { color: var(--text); }
.detail-title-row { display: flex; align-items: center; gap: 10px; }
.detail-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.detail-title { font-size: 20px; font-weight: 500; flex: 1; }
.detail-sub { font-size: 13px; color: var(--text-secondary); margin-top: 3px; padding-left: 24px; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--border); background: var(--bg); }
@media (max-width: 600px) { .stats { grid-template-columns: repeat(2,1fr); } }
.stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 14px; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; }
.controls { display: flex; align-items: center; gap: 8px; padding: 0.875rem 1.5rem; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-wrap: wrap; }
.controls select { font-size: 13px; padding: 6px 10px; height: 34px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: var(--bg); color: var(--text); cursor: pointer; font-family: inherit; }
.range-label { margin-left: auto; font-size: 12px; color: var(--text-secondary); }
.btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 6px 14px; height: 34px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.12s; }
.btn:hover { background: var(--bg-secondary); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { color: var(--red-text); border-color: var(--red); }
.btn.danger:hover { background: var(--red-light); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Gantt */
.timeline-wrap { padding: 1.5rem; overflow-x: auto; background: var(--bg); }
.gantt-header-row { display: flex; margin-bottom: 8px; margin-top: 22px; }
.task-col { width: 220px; min-width: 220px; flex-shrink: 0; }
.month-col { flex: 1; position: relative; height: 28px; min-width: 0; }
.month-tick { position: absolute; font-size: 11px; color: var(--text-secondary); white-space: nowrap; top: 8px; }
.month-divider { position: absolute; top: 0; width: 0.5px; background: var(--border); pointer-events: none; }
.today-line { position: absolute; top: -4px; width: 2px; background: var(--red); pointer-events: none; z-index: 5; box-shadow: 0 0 0 3px rgba(226,75,74,0.14); }
.today-label { position: absolute; top: -26px; font-size: 11px; color: #fff; background: var(--red); font-weight: 700; padding: 3px 9px; border-radius: 20px; transform: translateX(-50%); white-space: nowrap; z-index: 6; box-shadow: 0 2px 6px rgba(226,75,74,0.35); letter-spacing: 0.02em; }
.today-label::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: var(--red); border-radius: 1px; z-index: -1; }
.gantt-row { display: flex; align-items: center; min-height: 48px; border-radius: var(--radius-md); padding: 6px 0; }
.gantt-row:hover { background: var(--bg-secondary); }
.task-info { width: 220px; min-width: 220px; flex-shrink: 0; padding: 0 12px; }
.task-name-row { display: flex; align-items: center; gap: 4px; min-width: 0; }
.expand-btn { width: 16px; height: 16px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; padding: 0; font-size: 11px; }
.expand-btn:hover { color: var(--text); }
.task-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.task-name.subtask { font-weight: 400; font-size: 12.5px; color: var(--text-secondary); }
.task-actions { display: none; gap: 2px; margin-left: auto; flex-shrink: 0; }
.gantt-row:hover .task-actions { display: flex; }
.task-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.gantt-area { flex: 1; position: relative; height: 36px; min-width: 0; }
.gantt-bar { position: absolute; height: 28px; top: 4px; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; cursor: pointer; transition: filter 0.15s; z-index: 2; }
.gantt-bar.subtask-bar { height: 20px; top: 8px; opacity: 0.9; }
.gantt-bar:hover { filter: brightness(0.88); }
.progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,0.22); border-radius: 6px; pointer-events: none; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 0.75rem 1.5rem 1.25rem; border-top: 0.5px solid var(--border); background: var(--bg); }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px; }
.empty i { font-size: 32px; display: block; margin-bottom: 8px; }

/* Modals */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: 460px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; }
.form-row input, .form-row select { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: var(--bg); color: var(--text); font-family: inherit; height: 36px; }
.form-row textarea { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: var(--bg); color: var(--text); font-family: inherit; resize: vertical; min-height: 60px; line-height: 1.4; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.task-notes-icon { color: var(--text-secondary); font-size: 12px; flex-shrink: 0; cursor: help; }
.task-notes-icon:hover { color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.progress-preview-bg { width: 100%; height: 6px; background: var(--bg-secondary); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.progress-preview-fill { height: 6px; border-radius: 3px; background: var(--accent); transition: width 0.2s; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s; }
.color-swatch.selected { border-color: var(--text); }
.subtask-of-label { font-size: 12px; color: var(--text-secondary); background: var(--bg-secondary); border-radius: var(--radius-md); padding: 8px 10px; margin-bottom: 14px; display: none; }
</style>
</head>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let projects = [];
let tasks = [];
let activeProjectId = null;
let editingTaskId = null;
let editingProjId = null;
let collapsedIds = new Set();
let db = null; // set to the imported script.js module once it's loaded

// ══════════════════════════════════════════
//  SUPABASE DATA LAYER
// ══════════════════════════════════════════
// script.js's tasks table uses "end_date" and "parent_id" as column names, but the
// rest of this app's code (rendering, filtering, etc.) works with "end" and "parentId".
// These helpers translate between the two at the boundary.
function mapProjectFromDb(row){
  return { ...row, id: String(row.id) };
}
function mapTaskFromDb(row){
  return {
    ...row,
    id: String(row.id),
    pid: String(row.pid),
    end: row.end_date,
    parentId: row.parent_id != null ? String(row.parent_id) : null
  };
}
function mapTaskToDb(t){
  return {
    pid: t.pid,
    name: t.name,
    start: t.start,
    end_date: t.end,
    status: t.status,
    phase: t.phase,
    progress: t.progress,
    assignee: t.assignee,
    notes: t.notes || null,
    parent_id: t.parentId || null
  };
}

async function loadData(){
  try {
    const { projects: p, tasks: t } = await db.loadAll();
    if((!p || !p.length) && (!t || !t.length)){
      await seedRemoteDemoData();
      const reloaded = await db.loadAll();
      projects = (reloaded.projects || []).map(mapProjectFromDb);
      tasks = (reloaded.tasks || []).map(mapTaskFromDb);
    } else {
      projects = (p || []).map(mapProjectFromDb);
      tasks = (t || []).map(mapTaskFromDb);
    }
  } catch(e){
    showToast('Could not load data from Supabase', true);
    projects = []; tasks = [];
  }
}

// Inserts the demo projects/tasks into Supabase (used only when the tables are empty).
async function seedRemoteDemoData(){
  const sp = seedProjects();
  const st = seedTasks();
  const pidMap = {};
  for(const p of sp){
    const created = await db.addProject({ name: p.name, color: p.color, desc: p.desc });
    if(created) pidMap[p.id] = created.id;
  }
  const idMap = {};
  const parents = st.filter(t=>!t.parentId);
  const children = st.filter(t=>t.parentId);
  for(const t of parents){
    const created = await db.addTask({
      pid: pidMap[t.pid], name: t.name, start: t.start, end_date: t.end,
      status: t.status, phase: t.phase, progress: t.progress, assignee: t.assignee
    });
    if(created) idMap[t.id] = created.id;
  }
  for(const t of children){
    await db.addTask({
      pid: pidMap[t.pid], name: t.name, start: t.start, end_date: t.end,
      status: t.status, phase: t.phase, progress: t.progress, assignee: t.assignee,
      parent_id: idMap[t.parentId] || null
    });
  }
}

// ══════════════════════════════════════════
//  EXCEL IMPORT
// ══════════════════════════════════════════
// Expected workbook layout (see downloadExcelTemplate()):
//   Sheet "Tasks" (required): Project, Task, Start, End, Status, Phase, Progress, Assignee, Notes, Parent Task
//   Sheet "Projects" (optional): Project, Color, Description — used to set project color/description
//     if a project name doesn't already exist. Any project name referenced in Tasks that doesn't
//     already exist locally gets created automatically (with an auto-picked color if not specified).
const VALID_STATUSES = ['Not started','In progress','Done','Overdue','Milestone'];

function excelDateToStr(v){
  if(v === null || v === undefined || v === '') return '';
  let d;
  if(v instanceof Date) d = v;
  else { d = new Date(v); if(isNaN(d)) return ''; }
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function normalizeStatus(v){
  const s = String(v||'').trim();
  return VALID_STATUSES.find(x => x.toLowerCase() === s.toLowerCase()) || 'Not started';
}
function normalizeProgress(v){
  const n = parseInt(v, 10);
  if(isNaN(n)) return 0;
  return Math.max(0, Math.min(100, n));
}

async function handleExcelFile(file){
  if(!file) return;
  if(!window.XLSX){ showToast('Excel library failed to load — check your connection', true); return; }
  if(!db){ showToast('Still connecting to the database, please try again in a moment', true); return; }

  showToast('Reading file…');
  let wb;
  try {
    const buf = await file.arrayBuffer();
    wb = XLSX.read(buf, { type:'array', cellDates:true });
  } catch(e){
    showToast('Could not read that file: ' + (e.message || e), true);
    return;
  }

  // Auto-detect the "Drawing Summary Report" layout: any sheet with a header row
  // containing both "Project Name" and "ARCH" columns gets the specialized importer.
  for(const sheetName of wb.SheetNames){
    const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header:1, defval:'' });
    const headerRowIdx = aoa.findIndex(row => row.some(c => String(c).trim() === 'Project Name'));
    if(headerRowIdx !== -1){
      const header = aoa[headerRowIdx].map(h => String(h||'').trim());
      if(header.includes('ARCH')){
        await importDrawingSummaryReport(aoa, headerRowIdx);
        return;
      }
    }
  }

  const taskSheetName = wb.SheetNames.find(n => n.trim().toLowerCase() === 'tasks') || wb.SheetNames[0];
  const taskRows = XLSX.utils.sheet_to_json(wb.Sheets[taskSheetName], { defval:'' });
  if(!taskRows.length){ showToast('No rows found in the Tasks sheet', true); return; }

  const projSheetName = wb.SheetNames.find(n => n.trim().toLowerCase() === 'projects');
  const projRows = projSheetName ? XLSX.utils.sheet_to_json(wb.Sheets[projSheetName], { defval:'' }) : [];

  await importFromRows(projRows, taskRows);
}

async function importFromRows(projRows, taskRows){
  showToast('Importing…');

  const existingProjIdByName = {};
  projects.forEach(p => { existingProjIdByName[p.name.trim().toLowerCase()] = p.id; });

  const projMetaByName = {};
  projRows.forEach(r => {
    const name = String(r.Project || r.project || '').trim();
    if(!name) return;
    projMetaByName[name.toLowerCase()] = {
      color: String(r.Color || r.color || '').trim(),
      desc: String(r.Description || r.Desc || r.desc || '').trim()
    };
  });

  const neededNames = [];
  const seenNames = new Set();
  [...taskRows, ...projRows].forEach(r => {
    const name = String(r.Project || r.project || '').trim();
    if(name && !seenNames.has(name.toLowerCase())){ seenNames.add(name.toLowerCase()); neededNames.push(name); }
  });

  let colorIdx = 0, createdProjects = 0;
  for(const name of neededNames){
    const key = name.toLowerCase();
    if(existingProjIdByName[key]) continue;
    const meta = projMetaByName[key] || {};
    const color = meta.color || PROJECT_COLORS[colorIdx % PROJECT_COLORS.length];
    colorIdx++;
    try {
      const created = await db.addProject({ name, color, desc: meta.desc || '' });
      if(created){
        const mapped = mapProjectFromDb(created);
        projects.push(mapped);
        existingProjIdByName[key] = mapped.id;
        createdProjects++;
      }
    } catch(e){ /* skip, will show up as skipped tasks below */ }
  }

  let createdTasks = 0, skippedTasks = 0;
  const idByProjAndName = {};
  const deferredRows = [];

  for(const r of taskRows){
    const projName = String(r.Project || r.project || '').trim();
    const taskName = String(r.Task || r.task || r.Name || r.name || '').trim();
    const startStr = excelDateToStr(r.Start || r.start);
    const endStr = excelDateToStr(r.End || r.end || r['End Date'] || r['end date']);
    const parentName = String(r['Parent Task'] || r['Parent'] || r.parentTask || '').trim();

    if(!projName || !taskName || !startStr || !endStr){ skippedTasks++; continue; }
    const pid = existingProjIdByName[projName.toLowerCase()];
    if(!pid){ skippedTasks++; continue; }

    const obj = {
      pid, name: taskName, start: startStr, end: endStr,
      status: normalizeStatus(r.Status || r.status),
      phase: String(r.Phase || r.phase || '').trim(),
      progress: normalizeProgress(r.Progress ?? r.progress),
      assignee: String(r.Assignee || r.assignee || '').trim(),
      notes: String(r.Notes || r.notes || '').trim(),
      parentId: null
    };

    if(parentName){ deferredRows.push({ obj, projName, taskName, parentName }); continue; }

    try {
      const created = await db.addTask(mapTaskToDb(obj));
      if(created){
        const mapped = mapTaskFromDb(created);
        tasks.push(mapped);
        idByProjAndName[`${pid}||${taskName.toLowerCase()}`] = mapped.id;
        createdTasks++;
      } else skippedTasks++;
    } catch(e){ skippedTasks++; }
  }

  for(const { obj, taskName, parentName } of deferredRows){
    obj.parentId = idByProjAndName[`${obj.pid}||${parentName.toLowerCase()}`] || null;
    try {
      const created = await db.addTask(mapTaskToDb(obj));
      if(created){
        const mapped = mapTaskFromDb(created);
        tasks.push(mapped);
        idByProjAndName[`${obj.pid}||${taskName.toLowerCase()}`] = mapped.id;
        createdTasks++;
      } else skippedTasks++;
    } catch(e){ skippedTasks++; }
  }

  renderSidebar();
  if(document.getElementById('page-overview').classList.contains('active')) renderOverview();
  if(activeProjectId) renderDetail();

  const parts = [`Imported ${createdTasks} task${createdTasks===1?'':'s'}`];
  if(createdProjects) parts.push(`created ${createdProjects} project${createdProjects===1?'':'s'}`);
  if(skippedTasks) parts.push(`skipped ${skippedTasks} row${skippedTasks===1?'':'s'} (missing or invalid data)`);
  showToast(parts.join(', '), createdTasks === 0 && skippedTasks > 0);
}

// ══════════════════════════════════════════
//  DRAWING SUMMARY REPORT IMPORT
// ══════════════════════════════════════════
// Handles the "Design Drawings / Progress Tracker" report format: one row per
// unit/project, with a Status/discipline column per stage (ARCH, FLS, ELEC, HVAC,
// PL, FF, FA, STRUC, ACMV) plus approval & inspection stage columns. This report
// has no schedule dates at all, so every imported task defaults to today —
// edit dates afterwards to match your real schedule.
const REPORT_DISCIPLINE_HEADERS = ['ARCH','FLS','ELEC','HVAC','PL','FF','FA','STRUC','ACMV'];
const REPORT_APPROVAL_HEADERS = [
  'Concept Approval','Signage & ELV Approval','Auth Approval','Work Permit',
  'Above Ceiling Inspection','Interfacing (T&C)','Certificates','Final Inspection',
  'Completion','TLC','NOC to Trade'
];

function normalizeReportStatus(raw){
  const v = String(raw||'').trim().toLowerCase();
  if(!v || v === 'n/a') return null;
  if(v === 'done' || v === 'finished' || v === 'shared' || v.startsWith('approved')) return { status:'Done', progress:100 };
  if(v === 'pending' || v === 'in progress' || v === 'submitted') return { status:'In progress', progress:50 };
  if(v === 'incomplete') return { status:'Not started', progress:0 };
  return { status:'In progress', progress:50 };
}

async function importDrawingSummaryReport(aoa, headerRowIdx){
  const header = aoa[headerRowIdx].map(h => String(h||'').trim());
  const dataRows = aoa.slice(headerRowIdx+1).filter(r => r.some(c => String(c).trim() !== ''));
  if(!dataRows.length){ showToast('No data rows found under the header row', true); return; }

  const col = name => header.indexOf(name);
  const idxClient = col('Client No.');
  const idxJob = col('Job Order No.');
  const idxUnit = col('Unit No.');
  const idxArea = header.findIndex(h => h.toLowerCase().startsWith('area'));
  const idxCategory = col('Category');
  const idxOverallStatus = col('Status');
  const idxProjectName = col('Project Name');
  const idxNotes = col('Notes');
  const idxDesigner = col('Designer');
  const idxConsultant = col('Consultant');
  const idxContractor = col('Contractor');

  const disciplineCols = REPORT_DISCIPLINE_HEADERS.map(h => ({ header:h, idx: col(h), phase:'Design Disciplines' })).filter(c => c.idx !== -1);
  const approvalCols = REPORT_APPROVAL_HEADERS.map(h => ({ header:h, idx: col(h), phase:'Approvals & Inspections' })).filter(c => c.idx !== -1);
  const taskCols = [...disciplineCols, ...approvalCols];

  const todayStr = fmt(today);
  const categoryColors = {};
  let colorIdx = 0;
  function colorForCategory(cat){
    const key = (cat || 'Uncategorized').trim().toLowerCase();
    if(!categoryColors[key]){ categoryColors[key] = PROJECT_COLORS[colorIdx % PROJECT_COLORS.length]; colorIdx++; }
    return categoryColors[key];
  }

  const projectRows = [];
  const rowMeta = [];
  dataRows.forEach(r => {
    const projectNameRaw = String(r[idxProjectName]||'').trim();
    const unitNo = idxUnit !== -1 ? String(r[idxUnit]||'').trim() : '';
    if(!projectNameRaw && !unitNo) return;

    const clientNo = idxClient !== -1 ? String(r[idxClient]||'').trim() : '';
    const jobOrderNo = idxJob !== -1 ? String(r[idxJob]||'').trim() : '';
    const area = idxArea !== -1 ? String(r[idxArea]||'').trim() : '';
    const category = idxCategory !== -1 ? String(r[idxCategory]||'').trim() : '';
    const notes = idxNotes !== -1 ? String(r[idxNotes]||'').trim() : '';
    const designer = idxDesigner !== -1 ? String(r[idxDesigner]||'').trim() : '';
    const consultant = idxConsultant !== -1 ? String(r[idxConsultant]||'').trim() : '';
    const contractor = idxContractor !== -1 ? String(r[idxContractor]||'').trim() : '';
    const overallStatus = idxOverallStatus !== -1 ? String(r[idxOverallStatus]||'').trim() : '';

    const name = projectNameRaw ? (unitNo ? `${projectNameRaw} (${unitNo})` : projectNameRaw) : `Unit ${unitNo}`;
    const descParts = [];
    if(clientNo) descParts.push(`Client ${clientNo}`);
    if(jobOrderNo) descParts.push(`Job Order ${jobOrderNo}`);
    if(category) descParts.push(category);
    if(area) descParts.push(`${area} m²`);
    if(notes) descParts.push(notes);

    projectRows.push({ name, color: colorForCategory(category), desc: descParts.join(' · ') });
    rowMeta.push({ overallStatus, designer, consultant, contractor, r });
  });

  if(!projectRows.length){ showToast('No usable rows found (missing Project Name / Unit No.)', true); return; }

  showToast(`Importing ${projectRows.length} projects…`);
  let createdProjects;
  try {
    createdProjects = await db.addProjectsBulk(projectRows);
  } catch(e){
    showToast(dbErrorMsg('Could not create projects', e), true);
    return;
  }
  const mappedProjects = (createdProjects || []).map(mapProjectFromDb);
  mappedProjects.forEach(p => projects.push(p));

  const taskRows = [];
  mappedProjects.forEach((proj, i) => {
    const meta = rowMeta[i];
    const r = meta.r;

    const overallNorm = normalizeReportStatus(meta.overallStatus);
    if(overallNorm){
      taskRows.push({
        pid: proj.id, name: 'Overall status', start: todayStr, end_date: todayStr,
        status: overallNorm.status, phase: 'Overview', progress: overallNorm.progress,
        assignee: meta.designer || meta.consultant || meta.contractor || '',
        notes: meta.overallStatus, parent_id: null
      });
    }

    taskCols.forEach(({header, idx, phase}) => {
      const raw = String(r[idx]||'').trim();
      const norm = normalizeReportStatus(raw);
      if(!norm) return;
      taskRows.push({
        pid: proj.id, name: header, start: todayStr, end_date: todayStr,
        status: norm.status, phase, progress: norm.progress,
        assignee: '', notes: raw, parent_id: null
      });
    });
  });

  renderSidebar();
  if(document.getElementById('page-overview').classList.contains('active')) renderOverview();

  if(!taskRows.length){
    showToast(`Imported ${mappedProjects.length} projects (no discipline/approval statuses found to import as tasks)`);
    return;
  }

  showToast(`Importing ${taskRows.length} tasks…`);
  let createdTasks;
  try {
    createdTasks = await db.addTasksBulk(taskRows);
  } catch(e){
    showToast(dbErrorMsg('Projects imported, but tasks failed', e), true);
    return;
  }
  const mappedTasks = (createdTasks || []).map(mapTaskFromDb);
  mappedTasks.forEach(t => tasks.push(t));

  if(document.getElementById('page-overview').classList.contains('active')) renderOverview();
  if(activeProjectId) renderDetail();

  showToast(`Imported ${mappedProjects.length} projects and ${mappedTasks.length} tasks. All dates default to today — edit them to match your real schedule.`);
}

let toastTimer;
function showToast(msg, isError=false){
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').className = isError ? 'ti ti-x' : 'ti ti-check';
  el.className = 'show' + (isError?' error':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className=''; }, 2500);
}
// Appends the real Supabase/JS error message (if any) so failures are debuggable
// without opening devtools. Pass the caught exception `e` when calling from a catch block.
function dbErrorMsg(fallback, e){
  if(e && e.message) return `${fallback}: ${e.message}`;
  if(db && db.lastError && db.lastError.message) return `${fallback}: ${db.lastError.message}`;
  return fallback;
}

function getProjectTasks(pid){ return tasks.filter(t=>t.pid===pid); }
function getRange(taskList){
  if(!taskList.length) return {min:today,max:addDays(today,60)};
  const all=[...taskList.map(t=>parseD(t.start)),...taskList.map(t=>parseD(t.end))];
  return { min:addDays(new Date(Math.min(...all)),-5), max:addDays(new Date(Math.max(...all)),10) };
}

function renderOverview(){
  const done=tasks.filter(t=>t.status==='Done').length;
  const inprog=tasks.filter(t=>t.status==='In progress').length;
  const overdue=tasks.filter(t=>t.status==='Overdue').length;
  document.getElementById('ov-subtitle').textContent=`${projects.length} active projects · ${tasks.length} tasks total`;
  document.getElementById('ov-stats').innerHTML=`
    <div class="ov-card"><div class="ov-label">Projects</div><div class="ov-value">${projects.length}</div></div>
    <div class="ov-card"><div class="ov-label">Total tasks</div><div class="ov-value">${tasks.length}</div></div>
    <div class="ov-card"><div class="ov-label">Completed</div><div class="ov-value" style="color:var(--green)">${done}</div></div>
    <div class="ov-card"><div class="ov-label">In progress</div><div class="ov-value" style="color:var(--blue)">${inprog}</div></div>
    <div class="ov-card"><div class="ov-label">Overdue</div><div class="ov-value" style="color:var(--red)">${overdue}</div></div>`;
  const cards=document.getElementById('ov-cards');
  if(!projects.length){ cards.innerHTML='<div class="empty"><i class="ti ti-folder-off"></i>No projects yet. Create one to get started.</div>'; return; }
  cards.innerHTML=projects.map(p=>{
    const pt=getProjectTasks(p.id);
    const pdone=pt.filter(t=>t.status==='Done').length;
    const pinprog=pt.filter(t=>t.status==='In progress').length;
    const poverdue=pt.filter(t=>t.status==='Overdue').length;
    const ppct=pt.length?Math.round((pdone/pt.length)*100):0;
    const {min,max}=getRange(pt);
    const todayPct=pct(today,min,max);
    const bars=pt.slice(0,8).map(t=>{ const l=pct(parseD(t.start),min,max),r=pct(parseD(t.end),min,max),w=Math.max(r-l,2),c=STATUS_COLORS[t.status]||'#888'; return `<div class="mini-bar" style="left:${l}%;width:${w}%;background:${c};opacity:0.85"></div>`; }).join('');
    const todayBar=todayPct>=0&&todayPct<=100?`<div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:2px;background:var(--red);border-radius:1px"></div>`:'';
    return `<div class="proj-card" onclick="showProject('${p.id}')">
      <div class="proj-card-header">
        <div class="proj-card-dot" style="background:${p.color}"></div>
        <div><div class="proj-card-title">${p.name}</div>${p.desc?`<div class="proj-card-meta">${p.desc}</div>`:''}</div>
        <div style="margin-left:auto;font-size:12px;color:var(--text-secondary)">${ppct}% done</div>
      </div>
      <div class="mini-gantt"><div class="mini-bar-wrap">${bars}${todayBar}</div></div>
      <div class="proj-card-stats">
        <div class="proj-card-stat"><div class="cs-label">Tasks</div><div class="cs-value">${pt.length}</div></div>
        <div class="proj-card-stat"><div class="cs-label">Done</div><div class="cs-value" style="color:var(--green)">${pdone}</div></div>
        <div class="proj-card-stat"><div class="cs-label">In progress</div><div class="cs-value" style="color:var(--blue)">${pinprog}</div></div>
        <div class="proj-card-stat"><div class="cs-label">Overdue</div><div class="cs-value" style="color:var(--red)">${poverdue}</div></div>
      </div></div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  DETAIL / GANTT (with subtask hierarchy)
// ══════════════════════════════════════════
function renderDetail(){
  if(!activeProjectId) return;
  const proj=projects.find(p=>p.id===activeProjectId); if(!proj) return;
  const pt=getProjectTasks(activeProjectId);
  const {min,max}=getRange(pt);
  document.getElementById('d-dot').style.background=proj.color;
  document.getElementById('d-title').textContent=proj.name;
  const allD=pt.length?[...pt.map(t=>parseD(t.start)),...pt.map(t=>parseD(t.end))]:[];
  if(allD.length){
    const mn=new Date(Math.min(...allD)),mx=new Date(Math.max(...allD));
    const weeks=Math.round((mx-mn)/(1000*60*60*24*7));
    document.getElementById('d-sub').textContent=(proj.desc||'')+(proj.desc?' · ':'')+mn.toLocaleDateString('en-US',{month:'short',year:'numeric'})+' — '+mx.toLocaleDateString('en-US',{month:'short',year:'numeric'})+' · '+weeks+' weeks';
  } else { document.getElementById('d-sub').textContent=proj.desc||'No tasks yet'; }

  const fs=document.getElementById('filter-status').value;
  const fp=document.getElementById('filter-phase').value;
  const matchesFilter = t => (fs==='all'||t.status===fs)&&(fp==='all'||t.phase===fp);
  const phases=[...new Set(pt.map(t=>t.phase).filter(Boolean))];
  const selPhase=document.getElementById('filter-phase'); const curPhase=selPhase.value;
  selPhase.innerHTML='<option value="all">All phases</option>'+phases.map(p=>`<option value="${p}"${curPhase===p?' selected':''}>${p}</option>`).join('');

  const matchingTasks = pt.filter(matchesFilter);
  document.getElementById('s-total').textContent=matchingTasks.length;
  document.getElementById('s-done').textContent=matchingTasks.filter(t=>t.status==='Done').length;
  document.getElementById('s-progress').textContent=matchingTasks.filter(t=>t.status==='In progress').length;
  document.getElementById('s-overdue').textContent=matchingTasks.filter(t=>t.status==='Overdue').length;
  document.getElementById('range-label').textContent=fmt(min)+' → '+fmt(max);

  const mh=document.getElementById('month-header'); mh.innerHTML='';
  const todayPct=pct(today,min,max);
  if(todayPct>=0&&todayPct<=100){
    const tl=document.createElement('div'); tl.className='today-line'; tl.style.left=todayPct+'%';
    const tlbl=document.createElement('div'); tlbl.className='today-label'; tlbl.style.left=todayPct+'%'; tlbl.textContent='Today · '+today.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    mh.appendChild(tl); mh.appendChild(tlbl);
  }
  let cur=new Date(min.getFullYear(),min.getMonth(),1);
  while(cur<=max){
    const p2=pct(cur,min,max);
    if(p2>=0&&p2<=100){
      const tick=document.createElement('div'); tick.className='month-tick'; tick.style.left=p2+'%';
      tick.textContent=cur.toLocaleDateString('en-US',{month:'short',year:'2-digit'}); mh.appendChild(tick);
      const line=document.createElement('div'); line.className='month-divider'; line.style.left=p2+'%'; mh.appendChild(line);
    }
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  // ── Build parent/child hierarchy, respecting filters & collapse state ──
  const childrenMap = {};
  pt.forEach(t=>{ const key=t.parentId||'__root__'; (childrenMap[key]=childrenMap[key]||[]).push(t); });
  function includeSubtree(t){
    const kids = childrenMap[t.id]||[];
    return matchesFilter(t) || kids.some(includeSubtree);
  }
  const roots = (childrenMap['__root__']||[]).slice().sort((a,b)=>parseD(a.start)-parseD(b.start));
  const rows = [];
  function walk(t, depth){
    if(!includeSubtree(t)) return;
    const kids=(childrenMap[t.id]||[]).slice().sort((a,b)=>parseD(a.start)-parseD(b.start));
    rows.push({task:t, depth, hasChildren: kids.length>0});
    if(kids.length && !collapsedIds.has(t.id)){
      kids.forEach(k=>walk(k, depth+1));
    }
  }
  roots.forEach(r=>walk(r,0));

  const container=document.getElementById('gantt-rows');
  if(!rows.length){ container.innerHTML='<div class="empty"><i class="ti ti-layout-board"></i>No tasks match your filters</div>'; return; }
  container.innerHTML='';
  rows.forEach(({task, depth, hasChildren})=>{
    const s=parseD(task.start),e=parseD(task.end);
    const left=pct(s,min,max),right=pct(e,min,max),width=Math.max(right-left,1.5);
    const isMilestone=task.status==='Milestone',color=STATUS_COLORS[task.status]||'#888';
    const isSub = !!task.parentId;
    const row=document.createElement('div'); row.className='gantt-row';

    const info=document.createElement('div'); info.className='task-info';
    info.style.paddingLeft=(12+depth*18)+'px';

    const nameRow=document.createElement('div'); nameRow.className='task-name-row';
    if(hasChildren){
      const exp=document.createElement('button'); exp.className='expand-btn'; exp.title='Toggle subtasks';
      exp.innerHTML=`<i class="ti ti-chevron-${collapsedIds.has(task.id)?'right':'down'}"></i>`;
      exp.onclick=(e)=>toggleCollapse(e, task.id);
      nameRow.appendChild(exp);
    }
    const nameEl=document.createElement('div'); nameEl.className='task-name'+(isSub?' subtask':''); nameEl.title=task.name; nameEl.textContent=task.name;
    nameRow.appendChild(nameEl);
    if(task.notes){
      const noteIcon=document.createElement('i'); noteIcon.className='ti ti-note task-notes-icon'; noteIcon.title='Note: '+task.notes;
      nameRow.appendChild(noteIcon);
    }
    if(!isSub){
      const actions=document.createElement('div'); actions.className='task-actions';
      const addSub=document.createElement('button'); addSub.className='icon-btn'; addSub.title='Add subtask';
      addSub.innerHTML='<i class="ti ti-plus" style="font-size:11px"></i>';
      addSub.onclick=(e)=>{ e.stopPropagation(); openAddSubtask(task.id); };
      actions.appendChild(addSub);
      nameRow.appendChild(actions);
    }
    info.appendChild(nameRow);
    const meta=document.createElement('div'); meta.className='task-meta';
    meta.textContent=[task.assignee,task.phase].filter(Boolean).join(' · ');
    info.appendChild(meta);
    row.appendChild(info);

    const area=document.createElement('div'); area.className='gantt-area';
    if(todayPct>=0&&todayPct<=100){
      const tl2=document.createElement('div');
      tl2.style.cssText=`position:absolute;left:${todayPct}%;top:0;bottom:0;width:1.5px;background:var(--red);opacity:0.2;pointer-events:none;z-index:1`;
      area.appendChild(tl2);
    }
    const bar=document.createElement('div'); bar.className='gantt-bar'+(isSub?' subtask-bar':''); bar.style.left=left+'%'; bar.style.background=color;
    if(isMilestone){ bar.style.width='28px'; bar.style.height='28px'; bar.style.borderRadius='50%'; bar.style.padding='0'; bar.style.justifyContent='center'; bar.innerHTML='<i class="ti ti-flag" style="font-size:14px"></i>'; }
    else {
      bar.style.width=width+'%';
      if(task.progress>0&&task.progress<100){ const fill=document.createElement('div'); fill.className='progress-fill'; fill.style.width=task.progress+'%'; bar.appendChild(fill); }
      if(task.progress>15){ const lbl=document.createElement('span'); lbl.style.position='relative'; lbl.textContent=task.progress+'%'; bar.appendChild(lbl); }
    }
    bar.title=`${task.name}\n${task.start} → ${task.end}\nStatus: ${task.status}\nProgress: ${task.progress}%\nAssignee: ${task.assignee||'—'}`+(task.notes?`\nNotes: ${task.notes}`:'');
    bar.onclick=()=>openEditTask(task.id);
    area.appendChild(bar); row.appendChild(area); container.appendChild(row);
  });

  // Cap the vertical guide lines (today marker + month dividers) to end exactly
  // at the bottom of the last task row, instead of stretching indefinitely
  // (which previously bled through the legend below the timeline).
  const linesHeight = container.offsetHeight;
  document.querySelectorAll('#month-header .today-line, #month-header .month-divider').forEach(el=>{
    el.style.height = linesHeight + 'px';
  });
}

function toggleCollapse(e, id){
  e.stopPropagation();
  if(collapsedIds.has(id)) collapsedIds.delete(id); else collapsedIds.add(id);
  renderDetail();
}

async function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ alert('Please enter a task name.'); return; }
  const start=document.getElementById('f-start').value, end=document.getElementById('f-end').value;
  if(!start||!end){ alert('Please set start and end dates.'); return; }
  const parentId=document.getElementById('f-parentId').value || null;
  const obj={ name, start, end,
    status: document.getElementById('f-status').value,
    phase:  document.getElementById('f-phase').value.trim(),
    progress: parseInt(document.getElementById('f-progress').value),
    assignee: document.getElementById('f-assignee').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    pid: activeProjectId,
    parentId
  };
  try {
    if(editingTaskId){
      const updated = await db.updateTask(editingTaskId, mapTaskToDb(obj));
      if(updated){
        const i=tasks.findIndex(t=>t.id===editingTaskId);
        tasks[i]=mapTaskFromDb(updated);
        showToast('Task updated');
      } else { showToast(dbErrorMsg('Error updating task'), true); }
    } else {
      const created = await db.addTask(mapTaskToDb(obj));
      if(created){
        tasks.push(mapTaskFromDb(created));
        showToast(parentId?'Subtask added':'Task added');
      } else { showToast(dbErrorMsg('Error adding task'), true); }
    }
  } catch(e){ showToast(dbErrorMsg('Error saving task', e),true); }
  closeTaskModal(); renderDetail(); renderSidebar();
}

async function deleteTask(){
  if(!editingTaskId) return;
  const hasKids = tasks.some(t=>t.parentId===editingTaskId);
  const msg = hasKids ? 'Delete this task and all its subtasks?' : 'Delete this task?';
  if(!confirm(msg)) return;
  try {
    const idsToDelete = [editingTaskId, ...tasks.filter(t=>t.parentId===editingTaskId).map(t=>t.id)];
    for(const id of idsToDelete){ await db.deleteTask(id); }
    tasks=tasks.filter(t=>!idsToDelete.includes(t.id));
    showToast('Task deleted');
  } catch(e){ showToast(dbErrorMsg('Error deleting task', e),true); }
  closeTaskModal(); renderDetail(); renderSidebar();
}

async function duplicateTask(taskId){
  const t=tasks.find(x=>x.id===taskId); if(!t) return;
  try {
    const created = await db.addTask(mapTaskToDb({...t, name:t.name+' (copy)'}));
    if(!created){ showToast(dbErrorMsg('Error duplicating task'), true); closeTaskModal(); return; }
    const newTask = mapTaskFromDb(created);
    tasks.push(newTask);
    // if it's a top-level task, duplicate its subtasks too
    const subtasks = tasks.filter(x=>x.parentId===taskId);
    for(const s of subtasks){
      const createdSub = await db.addTask(mapTaskToDb({...s, parentId:newTask.id, pid:t.pid}));
      if(createdSub) tasks.push(mapTaskFromDb(createdSub));
    }
    showToast('Task duplicated');
  } catch(e){ showToast(dbErrorMsg('Error duplicating task', e),true); }
  closeTaskModal(); renderDetail(); renderSidebar();
}

//  PROJECT CRUD
// ══════════════════════════════════════════
function renderColorGrid(selected){
  document.getElementById('color-grid').innerHTML=PROJECT_COLORS.map(c=>
    `<div class="color-swatch ${c===selected?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
  document.getElementById('pf-color').value=selected||PROJECT_COLORS[0];
}
function selectColor(c){
  document.getElementById('pf-color').value=c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('selected',s.style.background===c));
}
function openNewProject(){
  editingProjId=null;
  document.getElementById('proj-modal-title').textContent='New project';
  document.getElementById('pf-name').value='';
  document.getElementById('pf-desc').value='';
  document.getElementById('proj-delete-btn').style.display='none';
  document.getElementById('proj-duplicate-btn').style.display='none';
  renderColorGrid(PROJECT_COLORS[0]);
  document.getElementById('proj-modal').classList.add('open');
  setTimeout(()=>document.getElementById('pf-name').focus(),50);
}
function openEditProject(){ if(activeProjectId) openEditProjectById(activeProjectId); }
function openEditProjectById(pid){
  const p=projects.find(x=>x.id===pid); if(!p) return;
  editingProjId=pid;
  document.getElementById('proj-modal-title').textContent='Edit project';
  document.getElementById('pf-name').value=p.name;
  document.getElementById('pf-desc').value=p.desc||'';
  document.getElementById('proj-delete-btn').style.display='inline-flex';
  document.getElementById('proj-duplicate-btn').style.display='inline-flex';
  renderColorGrid(p.color);
  document.getElementById('proj-modal').classList.add('open');
  setTimeout(()=>document.getElementById('pf-name').focus(),50);
}
function closeProjModal(){
  document.getElementById('proj-modal').classList.remove('open');
}

async function saveProject(){
  const name=document.getElementById('pf-name').value.trim();
  if(!name){ alert('Please enter a project name.'); return; }
  const color=document.getElementById('pf-color').value;
  const desc=document.getElementById('pf-desc').value.trim();
  try {
    if(editingProjId){
      const updated = await db.updateProject(editingProjId, {name,color,desc});
      if(updated){
        const i=projects.findIndex(p=>p.id===editingProjId);
        projects[i]=mapProjectFromDb(updated);
        showToast('Project updated');
        closeProjModal();
        if(activeProjectId===editingProjId) renderDetail();
      } else { showToast(dbErrorMsg('Error saving project'), true); }
    } else {
      const created = await db.addProject({name,color,desc});
      if(created){
        const newProj = mapProjectFromDb(created);
        projects.push(newProj);
        showToast('Project created');
        closeProjModal();
        showProject(newProj.id);
      } else { showToast(dbErrorMsg('Error saving project'), true); }
    }
  } catch(e){ showToast(dbErrorMsg('Error saving project', e),true); }
  renderSidebar();
}
function confirmDeleteProject(pid){ openEditProjectById(pid); }

async function deleteProject(){
  if(!editingProjId) return;
  const p=projects.find(x=>x.id===editingProjId); if(!p) return;
  if(!confirm(`Delete "${p.name}" and all its tasks? This cannot be undone.`)) return;
  try {
    await db.deleteProject(editingProjId);
    projects=projects.filter(x=>x.id!==editingProjId);
    tasks=tasks.filter(t=>t.pid!==editingProjId);
    showToast('Project deleted');
  } catch(e){ showToast(dbErrorMsg('Error deleting project', e),true); }
  closeProjModal(); showOverview();
}

async function duplicateProject(pid){
  const p=projects.find(x=>x.id===pid); if(!p) return;
  try {
    const createdProj = await db.addProject({ name:'Copy of '+p.name, color:p.color, desc:p.desc });
    if(!createdProj){ showToast(dbErrorMsg('Error duplicating project'), true); closeProjModal(); return; }
    const newProj = mapProjectFromDb(createdProj);
    projects.push(newProj);

    const projTasks=getProjectTasks(pid);
    const idMap={};
    const parents = projTasks.filter(t=>!t.parentId);
    const children = projTasks.filter(t=>t.parentId);
    for(const t of parents){
      const created = await db.addTask(mapTaskToDb({...t, pid:newProj.id, parentId:null}));
      if(created){ const mapped=mapTaskFromDb(created); tasks.push(mapped); idMap[t.id]=mapped.id; }
    }
    for(const t of children){
      const created = await db.addTask(mapTaskToDb({...t, pid:newProj.id, parentId: idMap[t.parentId]||null}));
      if(created) tasks.push(mapTaskFromDb(created));
    }

    showToast('Project duplicated');
    renderSidebar();
    showProject(newProj.id);
  } catch(e){ showToast(dbErrorMsg('Error duplicating project', e),true); }
  closeProjModal();
}
